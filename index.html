<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily News — Carol Frazao</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap');
        :root {
            --bg: #FDF6F0;
            --text: #2D2420;
            --accent: #6b5548;
            --accent-light: #8A6C5E;
            --border: #E8DDD5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 3rem 2rem;
        }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        p {
            color: var(--accent-light);
            font-size: 1.1rem;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily News</h1>
        <p>Briefing diario de tendencias — @carolbxfrazao</p>
    </div>
</body>
</html>
